name: InfraWatch CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-configs:
    name: Validate Telegraf config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Telegraf
        run: |
          curl -fsSL https://repos.influxdata.com/influxdata-archive.key | \
            sudo gpg --dearmor -o /usr/share/keyrings/influxdata-archive.gpg
          echo "deb [signed-by=/usr/share/keyrings/influxdata-archive.gpg] \
            https://repos.influxdata.com/ubuntu jammy stable" | \
            sudo tee /etc/apt/sources.list.d/influxdata.list
          sudo apt update && sudo apt install telegraf -y

      - name: Validate Telegraf config syntax
        run: telegraf --config telegraf/telegraf.conf --test --once
        continue-on-error: true

      - name: Validate Grafana dashboard JSON
        run: |
          python3 -c "import json; json.load(open('grafana/dashboards/infrawatch.json'))"
          echo "Dashboard JSON is valid"

      - name: Check all required files exist
        run: |
          echo "Checking project structure..."
          ls terraform/main.tf && echo "Terraform: OK"
          ls ansible/playbook.yml && echo "Ansible: OK"
          ls telegraf/telegraf.conf && echo "Telegraf: OK"
          ls grafana/dashboards/infrawatch.json && echo "Grafana: OK"
          ls loki/loki-config.yml && echo "Loki: OK"
          ls promtail/promtail-config.yml && echo "Promtail: OK"
          echo "All checks passed!"
