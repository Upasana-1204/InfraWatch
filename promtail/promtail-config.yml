server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: ip-172-31-34-154
          __path__: /var/log/syslog

  - job_name: telegraf
    static_configs:
      - targets:
          - localhost
        labels:
          job: telegraf
          host: ip-172-31-34-154
          __path__: /var/log/telegraf*.log
